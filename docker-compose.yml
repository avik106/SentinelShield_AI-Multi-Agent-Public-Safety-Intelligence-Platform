version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sentinelshield
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinelshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Neo4j Graph DB
  neo4j:
    image: neo4j:5-community
    container_name: sentinel-neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: neo4j/neo4j_pass
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_pass 'RETURN 1' > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Qdrant Vector DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sentinel-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/v1/health > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 5. FastAPI Backend
  backend:
    build: .
    container_name: sentinel-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - APP_NAME=SentinelShield AI
      - SECRET_KEY=sentinel_jwt_secret_key_prod_2026
      - CORS_ORIGINS=["*"]
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=sentinel
      - POSTGRES_PASSWORD=sentinel_pass
      - POSTGRES_DB=sentinelshield
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_pass
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LLM_PROVIDER=huggingface
      - LLM_MODEL_NAME=mistralai/Mistral-7B-Instruct-v0.3
      - EMBEDDING_MODEL=BAAI/bge-m3
      - EMBEDDING_DIMENSION=1024
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # 6. React Nginx Frontend
  frontend:
    build: ./frontend
    container_name: sentinel-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  qdrant_data:
